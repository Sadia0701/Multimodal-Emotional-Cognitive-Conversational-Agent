<!DOCTYPE html>
<html>

<head>

<title>Embodied Cognitive Agent</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>

<style>

body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
}

#avatarCanvas{
width:600px;
height:500px;
margin:auto;
border:2px solid #444;
}

#video{
width:220px;
border:2px solid white;
margin-top:10px;
}

button{
padding:8px 14px;
margin:5px;
}

</style>

</head>

<body>

<h2>Embodied Cognitive Conversational Agent</h2>

<div id="avatarCanvas"></div>

<br>

<video id="video" autoplay playsinline></video>

<p id="status"></p>

<pre id="output"></pre>

<div id="controls">

<input type="text" id="textInput" placeholder="Type your message..." />
<button onclick="sendText()">Send</button>

<br><br>

<button onclick="startStreaming()">Start Conversation</button>
<button onclick="stopStreaming()">Stop</button>

</div>


<script>

/* ------------------------
AVATAR RENDERING
-------------------------*/
let ws = null;
let scene, camera, renderer, avatar;

function initAvatar(){

scene = new THREE.Scene();

camera = new THREE.PerspectiveCamera(
45,
600/500,
0.1,
1000
);

camera.position.z = 2;

renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(600,500);

document.getElementById("avatarCanvas").appendChild(renderer.domElement);


/* Lighting */

const hemiLight = new THREE.HemisphereLight(0xffffff,0x444444,1);
scene.add(hemiLight);

const dirLight = new THREE.DirectionalLight(0xffffff,1);
dirLight.position.set(0,2,2);
scene.add(dirLight);


/* Load Avatar */

const loader = new GLTFLoader();

loader.load(
"avatar.glb",
function(gltf){

avatar = gltf.scene;

avatar.scale.set(1.2,1.2,1.2);

scene.add(avatar);

}
);

animate();

}

function animate(){

requestAnimationFrame(animate);

if(avatar){
avatar.rotation.y += 0.002;
}

renderer.render(scene,camera);

}

initAvatar();



/* ------------------------
WEBCAM
-------------------------*/

async function startCamera(){

const video = document.getElementById("video");

const stream = await navigator.mediaDevices.getUserMedia({video:true});

video.srcObject = stream;

}

startCamera();



/* ------------------------
WEBSOCKET CONNECTION
-------------------------*/

//let ws;

function connectWebSocket(){

ws = new WebSocket("ws://10.104.112.32:8000/ws/multimodal");

ws.onopen = () => {
document.getElementById("status").innerText = "✅ Connected to backend";
};

ws.onmessage = (event) => {

const data = JSON.parse(event.data);

if(data.status) return;

if(data.text){

document.getElementById("output").innerText =
"Agent Response\n\n" +
data.text;

}

if(data.audio_file){

const audio = new Audio(
"data:audio/wav;base64," + data.audio_file
);

audio.play();

}

};

ws.onclose = () => {

document.getElementById("status").innerText =
"Connection Closed";

};

}



/* ------------------------
TEXT INPUT
-------------------------*/

function sendText(){

const input = document.getElementById("textInput");

if(!input.value.trim()) return;

ws.send(JSON.stringify({

type:"text",
text:input.value,
face_emotion:"neutral"

}));

input.value = "";

}



/* ------------------------
START / STOP
-------------------------*/

function startStreaming(){

connectWebSocket();

document.getElementById("status").innerText =
"Conversation Started";

}

function stopStreaming(){

if(ws) ws.close();

document.getElementById("status").innerText =
"Conversation Stopped";

}

</script>

</body>
</html>
