<!DOCTYPE html>
<html>

<head>
<title>Embodied Cognitive Agent</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

#avatarCanvas{
width:600px;
height:500px;
margin:auto;
border:2px solid #555;
}

#video{
width:200px;
border:2px solid white;
margin-top:10px;
}

button{
padding:8px 14px;
margin:5px;
}

</style>

<!-- Import map fixes the "three" module error -->
<link rel="icon" href="data:,">
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
  }
}
</script>

</head>

<body>

<h2>Embodied Cognitive Conversational Agent</h2>

<div id="avatarCanvas"></div>

<br>

<video id="video" autoplay playsinline></video>

<br><br>

<input type="text" id="textInput" placeholder="Type message">
<button onclick="sendText()">Send</button>

<br><br>

<button onclick="startStreaming()">Start Conversation</button>
<button onclick="stopStreaming()">Stop</button>

<p id="status"></p>
<pre id="output"></pre>


<script type="module">

import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";


/* ------------------ AVATAR ------------------ */

let scene, camera, renderer, avatar;

function initAvatar(){

scene = new THREE.Scene();

camera = new THREE.PerspectiveCamera(
45,
600/500,
0.1,
1000
);

camera.position.set(0, 1.2, 3);

renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(600,500);

document
.getElementById("avatarCanvas")
.appendChild(renderer.domElement);


/* lighting */

const light1 = new THREE.HemisphereLight(0xffffff,0x444444,1);
scene.add(light1);

const light2 = new THREE.DirectionalLight(0xffffff,1);
light2.position.set(0,2,2);
scene.add(light2);


/* load avatar */

const loader = new GLTFLoader();

loader.load(

"./avatar.glb",

function(gltf){

console.log("Avatar loaded successfully");

avatar = gltf.scene;

avatar.scale.set(1.2,1.2,1.2);

/* move avatar upward so torso is centered */

avatar.position.y = -1.1;
camera.position.set(0,1.4,2.6);

scene.add(avatar);

},

function(progress){

console.log(
"Loading avatar:",
(progress.loaded / progress.total) * 100,
"%"
);

},

function(error){

console.error("Avatar failed to load:", error);

}

);

animate();

}


function animate(){

requestAnimationFrame(animate);

if(avatar){
avatar.rotation.y += 0.002;
}

renderer.render(scene,camera);

}

initAvatar();



/* ------------------ WEBCAM ------------------ */

async function startMedia(){

const stream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

const video = document.getElementById("video");

video.srcObject = stream;

/* audio streaming */

const audioContext = new AudioContext({sampleRate:16000});

const input = audioContext.createMediaStreamSource(stream);

const processor = audioContext.createScriptProcessor(4096,1,1);

processor.onaudioprocess = (event)=>{

const inputData = event.inputBuffer.getChannelData(0);

if(ws && ws.readyState === WebSocket.OPEN){

ws.send(JSON.stringify({
type:"audio_chunk",
data:Array.from(inputData)
}));

}

};

input.connect(processor);
processor.connect(audioContext.destination);

}

startMedia();



/* ------------------ WEBSOCKET ------------------ */

let ws = null;

function connectWebSocket(){

ws = new WebSocket("ws://10.104.112.32:8000/ws/multimodal");

ws.onopen = () => {

document.getElementById("status").innerText =
"Connected to backend";

};

ws.onmessage = (event) => {

const data = JSON.parse(event.data);

if(data.status) return;

if(data.text){

document.getElementById("output").innerText =
data.text;

}

if(data.audio_file){

const audio = new Audio(
"data:audio/wav;base64," + data.audio_file
);

audio.play();

}

};

ws.onclose = () => {

document.getElementById("status").innerText =
"Connection closed";

};

}



/* ------------------ TEXT INPUT ------------------ */

window.sendText = function(){

const input = document.getElementById("textInput");

if(!input.value.trim()) return;

if(!ws || ws.readyState !== WebSocket.OPEN){

alert("Backend not connected yet");
return;

}

ws.send(JSON.stringify({

type:"text",
text:input.value,
face_emotion:"neutral"

}));

input.value="";

}



/* ------------------ START / STOP ------------------ */

window.startStreaming = function(){

connectWebSocket();

}

window.stopStreaming = function(){

if(ws) ws.close();

}

</script>

</body>

</html>
