<!DOCTYPE html>
<html>
<head>
    <title>Multimodal Cognitive Agent</title>
</head>
<body>

<h2>Streaming Speech Interaction</h2>

<button id="startBtn">Start Streaming</button>
<button id="stopBtn">Stop Streaming</button>

<p id="status"></p>
<pre id="output"></pre>

<script>

const status = document.getElementById("status");
const output = document.getElementById("output");

let ws;
let mediaRecorder;
let stream;

function connectWebSocket() {
    ws = new WebSocket("ws://10.104.112.32:8000/ws/multimodal");

    ws.onopen = () => {
        status.innerText = "✅ Connected to backend";
    };

    ws.onmessage = (event) => {
        output.innerText = "🧠 SERVER RESPONSE:\n" + event.data;
    };

    ws.onclose = () => {
        status.innerText = "❌ Connection closed";
    };

    ws.onerror = (err) => {
        console.error(err);
        status.innerText = "⚠ WebSocket error";
    };
}

async function startStreaming() {

    if (!ws || ws.readyState !== WebSocket.OPEN) {
        connectWebSocket();
        await new Promise(r => setTimeout(r, 1000));
    }

    try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        mediaRecorder = new MediaRecorder(stream, {
            mimeType: "audio/webm"
        });

        mediaRecorder.ondataavailable = async (event) => {
            if (event.data.size > 0 && ws.readyState === WebSocket.OPEN) {

                const arrayBuffer = await event.data.arrayBuffer();
                const byteArray = new Uint8Array(arrayBuffer);

                let hexString = "";
                byteArray.forEach(b => {
                    hexString += b.toString(16).padStart(2, "0");
                });

                ws.send(JSON.stringify({
                    type: "audio_chunk",
                    data: hexString
                }));
            }
        };

        mediaRecorder.start(250); // send chunk every 250ms

        status.innerText = "🔴 Streaming audio...";
    }
    catch (err) {
        console.error(err);
        status.innerText = "❌ Microphone error";
    }
}

function stopStreaming() {
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
    }

    if (stream) {
        stream.getTracks().forEach(track => track.stop());
    }

    status.innerText = "🛑 Streaming stopped";
}

document.getElementById("startBtn").onclick = startStreaming;
document.getElementById("stopBtn").onclick = stopStreaming;

connectWebSocket();

</script>

</body>
</html>
