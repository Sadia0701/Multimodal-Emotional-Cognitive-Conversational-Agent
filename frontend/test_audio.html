<!DOCTYPE html>
<html>

<head>
    <title>Multimodal Cognitive Agent</title>
</head>

<body>

    <h2>Multimodal Cognitive Agent</h2>

    <button id="startBtn">Start Streaming</button>
    <button id="stopBtn">Stop Streaming</button>

    <br><br>

    <!-- TEXT INPUT MODULE -->
    <input type="text" id="textInput" placeholder="Type your message..." />
    <button onclick="sendText()">Send</button>

    <br><br>

    <video id="video" autoplay playsinline width="320" height="240"></video>

    <p id="status"></p>
    <pre id="output"></pre>

    <script>

        const status = document.getElementById("status");
        const output = document.getElementById("output");

        let ws;
        let audioContext;
        let processor;
        let input;
        let video;
        let faceInterval;

        let currentFaceEmotion = "neutral"; // Optional future use

        // ----------------------------
        // CONNECT WEBSOCKET
        // ----------------------------
        function connectWebSocket() {

            ws = new WebSocket("ws://10.104.112.32:8000/ws/multimodal");

            ws.onopen = () => {
                status.innerText = "✅ Connected to backend";
            };

            ws.onmessage = (event) => {

                const data = JSON.parse(event.data);

                // Ignore streaming status updates
                if (data.status) return;

                // Display structured cognitive output
                if (data.text) {
                    output.innerText =
                        "🧠 AGENT RESPONSE\n\n" +
                        "Text: " + data.text + "\n\n" +
                        "Emotion: " + data.agent_emotion + "\n" +
                        "Tone: " + data.tone + "\n" +
                        "Facial Expression: " + data.facial_expression + "\n" +
                        "Gesture: " + data.gesture + "\n" +
                        "Speaking Speed: " + data.speaking_speed;
                }
                //To play audio in frontend
                if (data.audio_file) {
                    const audio = new Audio("data:audio/wav;base64," + data.audio_file);
                    audio.play();
}
            };

            ws.onclose = () => {
                status.innerText = "❌ Connection closed";
            };

            ws.onerror = (err) => {
                console.error(err);
                status.innerText = "⚠ WebSocket error";
            };
        }

        // ----------------------------
        // TEXT INPUT HANDLER
        // ----------------------------
        function sendText() {

            const inputBox = document.getElementById("textInput");
            const userTypedText = inputBox.value;

            if (!userTypedText.trim()) return;

            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: "text",
                    text: userTypedText,
                    face_emotion: currentFaceEmotion
                }));
            }

            inputBox.value = "";
        }

        // ----------------------------
        // AUDIO STREAMING
        // ----------------------------
        async function startStreaming() {

            connectWebSocket();

            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

            audioContext = new AudioContext({ sampleRate: 16000 });

            input = audioContext.createMediaStreamSource(stream);

            processor = audioContext.createScriptProcessor(4096, 1, 1);

            processor.onaudioprocess = (event) => {

                const inputData = event.inputBuffer.getChannelData(0);

                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: "audio_chunk",
                        data: Array.from(inputData)
                    }));
                }
            };

            input.connect(processor);
            processor.connect(audioContext.destination);

            startCamera();

            status.innerText = "🔴 Streaming ...";
        }

        function stopStreaming() {

            if (processor) processor.disconnect();
            if (input) input.disconnect();
            if (audioContext) audioContext.close();

            stopCamera();

            status.innerText = "🛑 Streaming stopped";
        }

        // ----------------------------
        // VIDEO STREAMING
        // ----------------------------
        async function startCamera() {

            video = document.getElementById("video");

            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;

            faceInterval = setInterval(sendFrame, 800);
        }

        function stopCamera() {
            clearInterval(faceInterval);
        }

        function sendFrame() {

            if (!video || ws.readyState !== WebSocket.OPEN) return;

            const canvas = document.createElement("canvas");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(video, 0, 0);

            const imageData = canvas.toDataURL("image/jpeg", 0.6);

            ws.send(JSON.stringify({
                type: "video_frame",
                data: imageData
            }));
        }

        // ----------------------------
        // BUTTON EVENTS
        // ----------------------------
        document.getElementById("startBtn").onclick = startStreaming;
        document.getElementById("stopBtn").onclick = stopStreaming;

        // Initial connection
        connectWebSocket();

    </script>

</body>

</html>
